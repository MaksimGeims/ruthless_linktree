<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oleg | Linktree</title>
    <meta
      name="description"
      content="Oleg links: Discord, Roblox and Telegram."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card" aria-label="Linktree profile">
      <img
        class="avatar"
        src="avatar.jpg"
        alt="Oleg avatar"
        loading="eager"
        decoding="async"
      />
      <h1>Oleg</h1>
      <p class="subtitle">Discord, Roblox and Telegram</p>

      <section class="links" aria-label="Social links">
        <button class="link" type="button" data-copy="secrett7196">
          <span class="name">Discord: secrett7196</span>
          <span class="arrow" aria-hidden="true">#</span>
        </button>

        <a
          class="link"
          href="https://www.roblox.com/users/5708189509/profile"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="name">Roblox Profile</span>
          <span class="arrow" aria-hidden="true">↗</span>
        </a>

        <a
          class="link"
          href="http://t.me/oleshkavinik"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="name">Telegram: @oleshkavinik</span>
          <span class="arrow" aria-hidden="true">↗</span>
        </a>
      </section>

      <p class="footer">Built in black, white and gray.</p>
    </main>

    <div class="toast" role="status" aria-live="polite">Discord copied</div>
    <script src="script.js"></script>
  </body>
</html>
